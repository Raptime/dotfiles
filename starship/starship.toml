# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

# Theme
palette = "catppuccin_mocha"

# Prompt
format = """
($username$hostname:)\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character\
"""

# Modules
[username]
#show_always = true
style_user = 'text'
style_root = 'peach'
format = '[$user]($style)'

[hostname]
#ssh_only = false
style = 'teal'
format = '@[$hostname]($style)'

[directory]
style = 'blue'

[git_branch]
style = 'pink'
format = '[$branch(:$remote_branch) ]($style)'

[git_status]
style = 'red'
format = '([\[$all_status$ahead_behind\] ]($style))'

[cmd_duration]
style = 'yellow'
format = '[$duration ]($style)'

[character]
success_symbol = '[\$](green)'
error_symbol = '[\$](red)'

# Themes
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
