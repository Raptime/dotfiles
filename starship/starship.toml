format = """
$status\
$cmd_duration\
$jobs\
($username$hostname:)\
$directory\
$git_branch\
$git_status\
$character\
"""

right_format = """
$time\
"""

add_newline = false
#palette = "nord"
palette = "catppuccin_mocha"

[jobs]
style = 'green'

[cmd_duration]
style = 'yellow'
format = '[$duration]($style) '

[status]
disabled = false
style = 'red'
format = '[\[$status\]]($style)'

[username]
style_user = 'white'
style_root = 'purple'
format = '[$user]($style)'

[hostname]
style = 'cyan'
format = '@[$hostname]($style)'

[directory]
style = 'blue'

[git_branch]
style = 'green'
format = '[$branch(:$remote_branch)]($style) '

[git_status]
style = 'yellow'
format = '([$all_status$ahead_behind]($style) )'
#untracked = '?$count'
#modified = '!$count'

[character]
success_symbol = '[❯](green)'
error_symbol = '[❯](red)'

[time]
disabled = false
style = 'yellow'
format = '[$time]($style)'

